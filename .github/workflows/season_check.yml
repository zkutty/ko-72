name: Kō — Season Mailer

on:
  schedule:
    # 7:00 AM Pacific Standard Time (UTC-8) = 15:00 UTC
    # Adjust to 14:00 UTC during Daylight Saving Time if needed
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Run with --force flag (bypass date check)'
        required: false
        default: 'false'
        type: boolean

jobs:
  season-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit archive files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run season mailer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUBSCRIBER_EMAILS: ${{ secrets.SUBSCRIBER_EMAILS }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
          ARENA_ACCESS_TOKEN: ${{ secrets.ARENA_ACCESS_TOKEN }}
          ARENA_CHANNEL_SLUG: ${{ secrets.ARENA_CHANNEL_SLUG }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python season_mailer.py --force
          else
            python season_mailer.py
          fi

      - name: Commit and push archive changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/
          if git diff --staged --quiet; then
            echo "No archive changes to commit."
          else
            git commit -m "Archive: publish season for $(date -u +%Y-%m-%d)"
            git push
          fi
