name: Kō — Season Mailer (manual)

# Manual-only. The scheduled send lives in newsletter.yml — running both crons
# caused subscribers to receive duplicate (and sometimes wrong-language) emails.
on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Run with --force flag (bypass date check and idempotency guard)'
        required: false
        default: 'false'
        type: boolean

jobs:
  season-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit archive files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run season mailer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUBSCRIBER_EMAILS: ${{ secrets.SUBSCRIBER_EMAILS }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python season_mailer.py --force
          else
            python season_mailer.py
          fi

      - name: Commit and push archive changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/
          if git diff --staged --quiet; then
            echo "No archive changes to commit."
          else
            git commit -m "Archive: publish season for $(date -u +%Y-%m-%d)"
            git push
          fi
