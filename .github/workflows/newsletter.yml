name: Kō Newsletter

on:
  schedule:
    - cron: '0 1 * * *'  # 1am UTC daily — season transitions happen at midnight Japan time
  push:
    branches: [main]
  workflow_dispatch:      # manual trigger — rebuilds static files only, no email

concurrency:
  group: ko-newsletter
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run mailer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUBSCRIBER_EMAILS: ${{ secrets.SUBSCRIBER_EMAILS }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            python season_mailer.py
          else
            python season_mailer.py --force --build-only
          fi

      - name: Commit archive, cache, and homepage updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/ || true
          test -f index.html && git add index.html || true
          test -f sitemap.xml && git add sitemap.xml || true
          test -f data/content_cache.json && git add data/content_cache.json || true
          git diff --staged --quiet || git commit -m "Build $(date +%Y-%m-%d): static rebuild"
          git pull --rebase --autostash origin main
          git push
