name: Kō Newsletter

on:
  schedule:
    - cron: '0 1 * * *'  # 1am UTC daily — season transitions happen at midnight Japan time
  workflow_dispatch:      # allow manual trigger from GitHub UI

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run mailer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUBSCRIBER_EMAILS: ${{ secrets.SUBSCRIBER_EMAILS }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: python season_mailer.py

      - name: Commit archive, cache, and homepage updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/ data/content_cache.json index.html
          git diff --staged --quiet || git commit -m "Season $(date +%Y-%m-%d): archive and cache update"
          git push
