<!DOCTYPE html>
<html lang="{{ t.html_lang }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kō — {{ t.unsubscribe_title }}</title>
<link rel="alternate" hreflang="en" href="https://ko-72.com/unsubscribe.html">
<link rel="alternate" hreflang="ja" href="https://ko-72.com/ja/unsubscribe.html">
<link rel="alternate" hreflang="x-default" href="https://ko-72.com/unsubscribe.html">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #e8e5de; font-family: {% if lang == 'ja' %}'Hiragino Sans','Yu Gothic',{% endif %}system-ui, -apple-system, sans-serif; color: #2c2c2a; }
  .card { max-width: 480px; margin: 80px auto; background: #f5f3ee; padding: 48px 40px; text-align: center; }
  .logo { font-family: Georgia, serif; font-size: 22px; color: #1a1a18; margin: 0 0 32px 0; }
  .logo .kanji { font-family: system-ui, sans-serif; font-size: 14px; color: #888780; margin-left: 8px; }
  h1 { font-family: {% if lang == 'ja' %}'Hiragino Mincho ProN','Yu Mincho',{% endif %}Georgia, serif; font-size: 20px; font-weight: 400; margin: 0 0 10px 0; }
  p { font-size: 14px; color: #888780; line-height: 1.7; margin: 0 0 28px 0; }
  input[type="email"] {
    width: 100%; padding: 12px 16px; font-size: 14px; border: 1px solid #d8d5ce;
    background: #fff; outline: none; font-family: system-ui, sans-serif; margin-bottom: 12px;
  }
  input[type="email"]:focus { border-color: #888780; }
  button {
    width: 100%; padding: 12px; background: #2c2c2a; color: #f5f3ee; border: none;
    font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
    font-family: system-ui, sans-serif;
  }
  button:hover { background: #1a1a18; }
  .msg { display: none; font-size: 14px; margin: 16px 0 0 0; }
  .msg.success { color: #6b8f71; }
  .msg.error { color: #c9734a; }
  a { color: #888780; font-size: 13px; }
  .lang-switch { display: block; margin-top: 18px; font-size: 12px; }
</style>
</head>
<body>
<div class="card">
  <p class="logo">Kō<span class="kanji">候</span></p>
  <h1>{{ t.unsubscribe_title }}</h1>
  <p>{{ t.unsubscribe_prompt }}</p>
  <form id="form">
    <input type="email" id="email" placeholder="{{ t.subscribe_email_placeholder }}" required>
    <button type="submit">{{ t.unsubscribe_btn }}</button>
  </form>
  <p class="msg success" id="success">{{ t.unsubscribe_success }}</p>
  <p class="msg error" id="error">{{ t.unsubscribe_error }}</p>
  <br>
  <a href="{{ t.site_url }}/">{{ t.unsubscribe_back }}</a>
  <a class="lang-switch" href="{{ t.alt_site_url }}/unsubscribe.html" hreflang="{{ 'en' if lang == 'ja' else 'ja' }}" lang="{{ 'en' if lang == 'ja' else 'ja' }}">{{ t.alt_lang_label }}</a>
</div>

<script>
  const params = new URLSearchParams(location.search);
  if (params.get('email')) document.getElementById('email').value = params.get('email');

  document.getElementById('form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const btn = this.querySelector('button');
    btn.disabled = true;
    btn.textContent = '…';
    try {
      const res = await fetch('https://subscribe.ko-72.com/unsubscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      if (res.ok) {
        this.style.display = 'none';
        document.getElementById('success').style.display = 'block';
      } else {
        throw new Error();
      }
    } catch {
      btn.disabled = false;
      btn.textContent = '{{ t.unsubscribe_btn }}';
      document.getElementById('error').style.display = 'block';
    }
  });
</script>
</body>
</html>
